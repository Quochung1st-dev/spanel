# Logrotate config cho SPanel
# Rotates nginx, waf, và spanel logs

/opt/spanel/logs/nginx/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root www-data
    sharedscripts
    postrotate
        [ -f /opt/spanel/run/nginx.pid ] && kill -USR1 $(cat /opt/spanel/run/nginx.pid) 2>/dev/null || true
    endscript
}

/opt/spanel/logs/waf/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root www-data
    endscript
}

/opt/spanel/logs/spanel/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0640 spanel span el
    endscript
}