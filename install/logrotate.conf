# Logrotate config cho SPanel
# Rotates nginx, waf, và spanel logs

/var/server/ssl/quic.key {
    weekly
    rotate 52
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root www-data
}

/var/server/logs/nginx/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root www-data
    sharedscripts
    postrotate
        [ -f /var/server/run/nginx.pid ] && kill -USR1 $(cat /var/server/run/nginx.pid) 2>/dev/null || true
    endscript
}

/var/server/logs/waf/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root www-data
    endscript
}

/var/server/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0640 spanel spanel
    endscript
}