#==============================================================================
# WAF Configuration
# SPanel - Web Application Firewall
#==============================================================================

# WAF enabled flag (default: enabled)
map $http_x_waf_enabled $waf_enabled {
    "0"     "0";
    "off"   "0";
    default "1";
}

# WAF mode: active, passive, learning
map $http_x_waf_mode $waf_mode {
    "passive"   "passive";
    "learning"  "learning";
    default     "active";
}

# WAF log level: debug, info, warn, error
map $http_x_waf_log_level $waf_log_level {
    "debug"     "debug";
    "warn"      "warn";
    "error"     "error";
    default     "info";
}

# WAF shared dict for IP blocking
map $waf_enabled $waf_blocked {
    "1"     "";
    default "";
}

# WAF check result
map $waf_enabled $waf_check_result {
    "1"     "pass";
    default "bypass";
}

# WAF matched rule info
map $waf_enabled $waf_matched_rule {
    "1"     "";
    default "";
}

map $waf_enabled $waf_matched_var {
    "1"     "";
    default "";
}

# WAF IP block list (stored in shared dict)
# Format: key = IP, value = expire timestamp
# Check in access_by_lua

# WAF rate limit
limit_req_zone $binary_remote_addr zone=waf_limit:10m rate=10r/s;