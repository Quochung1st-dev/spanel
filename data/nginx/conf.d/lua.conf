#==============================================================================
# Lua Configuration
# SPanel - Lua module loading and settings
#==============================================================================

# Lua package path
lua_package_path '/var/server/lua/?.lua;;';

# Lua package cache
lua_package_cpath '/var/server/lua/?.so;;';

# Lua code cache
lua_code_cache on;

# Lua shared dict for cross-request data
lua_shared_dict spanel_shm 10m;
lua_shared_dict waf_shm 5m;
lua_shared_dict cache_shm 10m;

# Init worker phase
init_worker_by_lua_file /var/server/lua/init.lua;

# Request phases handled by Lua
rewrite_by_lua_file      /var/server/lua/rewrite.lua;
access_by_lua_file       /var/server/lua/access.lua;
header_filter_by_lua_file /var/server/lua/header_filter.lua;
body_filter_by_lua_file /var/server/lua/body_filter.lua;
log_by_lua_file         /var/server/lua/log.lua;