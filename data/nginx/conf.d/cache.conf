#==============================================================================
# Cache Configuration
# SPanel - Proxy Cache and Static File Cache
#==============================================================================

# Global proxy cache path
proxy_cache_path /var/server/cache/
                 levels=1:2
                 keys_zone=spanel_cache:10m
                 max_size=1G
                 inactive=60m
                 use_temp_path=off;

# Static file cache path
proxy_cache_path /var/server/cache/static/
                 levels=1:2
                 keys_zone=static_cache:50m
                 max_size=5G
                 inactive=30d
                 use_temp_path=off;

# Domain-specific cache paths (add below as needed)
# Cache for thietbihop.243.com
proxy_cache_path /var/cache/nginx/thietbihop.243.com
                 levels=1:2
                 keys_zone=spanel_cache_thietbihop:10m
                 max_size=5g
                 inactive=60d
                 use_temp_path=off;

# Cache valid keys
map $request_uri $cache_key {
    ~*^/(.*)$  $scheme$host$1;
    default    $scheme$host$request_uri;
}

# Cache control headers
map $sent_http_content_type $cache_expires {
    ~*^image/        30d;
    ~*^font/         30d;
    ~*^text/css      7d;
    ~*^application/javascript  7d;
    ~*^application/x-javascript 7d;
    default          1h;
}

# Cache bypass
map $cookie_nocache $skip_cache {
    1       1;
    default 0;
}

# Only cache GET and HEAD requests
map $request_method $skip_cache_method {
    default 1;
    GET     0;
    HEAD    0;
}

# WAF bypass for cached pages
map $uri $waf_cache_bypass {
    ~*\.php$        1;
    ~*/admin.*     1;
    ~*/wp-admin.*  1;
    default        0;
}