#==============================================================================
# FastCGI Cache Configuration
# PHP-FPM sites using FastCGI
#==============================================================================

#Cache Key
fastcgi_cache_key "$scheme$request_method$host$request_uri";

#Cache Path (uncomment the zone you need)
fastcgi_cache_path /var/run/website_1 levels=1:2 keys_zone=website_1:100m inactive=7d;
#fastcgi_cache_path /var/run/website_2 levels=1:2 keys_zone=website_2:100m inactive=60m;

#Stale cache
fastcgi_cache_use_stale error timeout invalid_header http_500;

#Ignore origin headers
fastcgi_ignore_headers Cache-Control Expires Set-Cookie;

#Cache valid
fastcgi_cache_valid 200 5m;
fastcgi_cache_valid 404 1m;

#Min uses
fastcgi_cache_min_uses 1;

#Methods
fastcgi_cache_methods GET HEAD POST;

#Add header
add_header X-FastCGI-Cache $upstream_cache_status;