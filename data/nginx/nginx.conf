#==============================================================================
# Nginx Master Configuration
# SPanel - Web Server Configuration
#==============================================================================

user                www-data;
worker_processes    auto;
error_log           /var/server/logs/nginx/error.log warn;
pid                 /var/server/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /var/server/nginx/conf/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/server/logs/nginx/access.log  main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip                on;
    gzip_vary           on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types         text/plain text/css text/xml application/json application/javascript
                       application/xml application/xml+rss text/javascript application/x-javascript;

    # Server limits
    client_max_body_size  100M;
    client_body_buffer_size 128k;

    # Buffer settings
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Timeouts
    client_body_timeout   60s;
    client_header_timeout 60s;
    send_timeout          60s;

    # Hidden versions
    server_tokens off;
    variables_hash_max_size 2048;

    # IP whitelist support
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;

    # Include additional configs
    include /var/server/nginx/conf/conf.d/*.conf;
    include /var/server/nginx/conf/sites-enabled/*.conf;
}