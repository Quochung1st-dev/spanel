#==============================================================================
# Default Server
# SPanel - Default catch-all server block
#==============================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /var/www/default/public_html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }

    access_log /var/server/logs/nginx/default_access.log;
    error_log /var/server/logs/nginx/default_error.log;
}