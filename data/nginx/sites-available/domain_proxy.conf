#==============================================================================
# Domain Proxy Template
# Proxy request to another domain with SSL bypass and caching
# Usage: v-add-domain domain.com --proxy https://target.com
#==============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN WWW_DOMAIN;
    return 301 TARGET_URL$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name DOMAIN WWW_DOMAIN;

    ssl_certificate SSL_DIR/fullchain.pem;
    ssl_certificate_key SSL_DIR/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Enable cache
    proxy_cache spanel_cache;
    proxy_cache_valid 200 302 10m;
    proxy_cache_valid 404 1m;
    proxy_cache_key "$scheme$host$request_uri";
    add_header X-Cache-Status $upstream_cache_status always;
    proxy_no_cache $skip_cache;
    proxy_cache_bypass $skip_cache;

    # Force cache ignoring origin headers
    proxy_ignore_headers Cache-Control Expires Set-Cookie X-Accel-Expires;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 24 4k;
    proxy_busy_buffers_size 8k;

    # Proxy to target
    location / {
        proxy_pass TARGET_URL;
        proxy_ssl_server_name on;
        proxy_set_header Host TARGET_HOST;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_min_uses 1;
    }

    # Static files cache longer
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot|otf)$ {
        proxy_pass TARGET_URL;
        proxy_ssl_server_name on;
        proxy_set_header Host TARGET_HOST;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_valid 200 30m;
        proxy_cache_use_stale error timeout updating invalid_header;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    access_log WWW_DIR/logs/access.log;
    error_log WWW_DIR/logs/error.log;
}