#==============================================================================
# Template: Nginx Proxy with Cache & Lua
# Domain: {{DOMAIN}}
# Upstream: {{UPSTREAM}}
# Created: {{DATE}}
#
# Luồng xử lý:
# 1. access_by_lua (inline):
#    - Có querystring → bypass_cache = 1
#    - Có WP cookies → bypass_cache = 1
#    - Không có → check cache thông thường
# 2. WAF check → block nếu vi phạm
# 3. WAF pass → vào backend
#==============================================================================

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}} www.{{DOMAIN}};

    access_log /var/www/{{DOMAIN}}/logs/access.log;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Proxy Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name {{DOMAIN}} www.{{DOMAIN}};

    # SSL Certificate
    ssl_certificate /var/server/ssl/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /var/server/ssl/{{DOMAIN}}/privkey.pem;

    # SSL Settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    #----------------------------------------------------------------------
    # LUA ACCESS PHASE (INLINE)
    # - Check cache bypass (querystring, WP cookies)
    # - WAF check
    # - Rate limiting
    #----------------------------------------------------------------------
    access_by_lua '
        local ngx = ngx
        local var = ngx.var
        local log = ngx.log
        local ERR = ngx.ERR
        local WARN = ngx.WARN

        local ngx_shared = ngx.shared
        local spanel_shm = ngx_shared and ngx_shared.spanel_shm
        local waf_shm = ngx_shared and ngx_shared.waf_shm

        -- Cookie names for WordPress (bypass cache)
        local WP_COOKIES = {
            "wordpress_test_cookie",
            "wordpress_logged_in_",
            "wp-settings-",
            "wp-settings-time-",
            "wordpress_",
            "comment_author_",
            "woocommerce_",
            "edd_wp_session"
        }

        -- Config
        local waf_enabled = os.getenv("WAF_ENABLED") or "true"
        local waf_mode = os.getenv("WAF_MODE") or "active"
        local rate_limit = os.getenv("RATE_LIMIT_ENABLED") or "true"
        local rate_limit_req = tonumber(os.getenv("RATE_LIMIT_REQUESTS") or "100")
        local rate_limit_window = tonumber(os.getenv("RATE_LIMIT_WINDOW") or "60")

        -- Initialize
        var.cache_action = "check"
        var.bypass_cache = "0"
        var.waf_check_result = "pass"

        -- Skip for internal
        if var.server_addr == var.remote_addr then
            return
        end

        -- STEP 1: Check cache bypass
        local args = var.args or ""
        local headers = ngx.req.get_headers()
        local cookie_header = headers["cookie"] or ""
        local bypass = false

        -- Has querystring
        if args and args ~= "" then
            bypass = true
            var.cache_action = "bypass_qs"
            var.bypass_cache = "1"
        end

        -- Has WP cookies
        if not bypass and cookie_header ~= "" then
            for _, pattern in ipairs(WP_COOKIES) do
                if string.find(cookie_header, pattern, 1, true) then
                    bypass = true
                    var.cache_action = "bypass_wp"
                    var.bypass_cache = "1"
                    break
                end
            end
        end

        -- STEP 2: WAF check
        if waf_enabled == "true" then
            local waf_ok, waf = pcall(require, "waf")
            if waf_ok then
                local result = waf.check()
                if not result.pass then
                    var.waf_check_result = "block"
                    var.waf_rule = result.rule or ""

                    -- Log
                    local log_file = io.open("/var/server/logs/waf/blocked.log", "a")
                    if log_file then
                        log_file:write(string.format(
                            "[%s] %s | %s | %s | %s\n",
                            ngx.localtime(),
                            var.remote_addr,
                            result.rule or "unknown",
                            result.reason or "unknown",
                            var.request_uri or ""
                        ))
                        log_file:close()
                    end

                    log(ERR, "[WAF] Blocked: ", var.remote_addr, " - ", result.reason)

                    if waf_mode == "active" then
                        ngx.status = ngx.HTTP_FORBIDDEN
                        ngx.say("403 Forbidden - Security Policy Violation")
                        ngx.exit(ngx.HTTP_FORBIDDEN)
                        return
                    end
                end
            end
        end

        -- STEP 3: Rate limit
        if rate_limit == "true" and spanel_shm then
            local key = "rate_limit:" .. var.remote_addr
            local current = spanel_shm:get(key)

            if current and current >= rate_limit_req then
                log(WARN, "[RateLimit] Limited: ", var.remote_addr)
                ngx.status = ngx.HTTP_TOO_MANY_REQUESTS
                ngx.say("429 Too Many Requests")
                ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
                return
            end

            local ok = spanel_shm:incr(key, 1)
            if not ok then
                spanel_shm:set(key, 1, rate_limit_window)
            end
        end

        log(WARN, "[SPanel] Pass: ", var.remote_addr, " ", var.request_uri, " (", var.cache_action, ")")
    ';

    #----------------------------------------------------------------------
    # Cache Configuration
    #----------------------------------------------------------------------
    proxy_cache spanel_cache;
    proxy_cache_valid 200 5m;
    proxy_cache_valid 404 1m;
    proxy_cache_key "$scheme$host$request_uri$cookie_nocache";
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_min_uses 1;
    proxy_cache_methods GET HEAD POST;

    # Cache bypass based on Lua set variable
    proxy_no_cache $bypass_cache;
    proxy_cache_bypass $bypass_cache;

    # Enable cache purge support
    proxy_cache_purge spanel_cache;

    # Ignore origin cache headers
    proxy_ignore_headers Cache-Control Expires Set-Cookie X-Accel-Expires;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 24 4k;
    proxy_busy_buffers_size 8k;

    # Logging
    access_log /var/www/{{DOMAIN}}/logs/access.log;
    error_log /var/www/{{DOMAIN}}/logs/error.log;

    #----------------------------------------------------------------------
    # Health Check - No cache, no WAF
    #----------------------------------------------------------------------
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    #----------------------------------------------------------------------
    # Cache Purge - Single URL
    # Usage: GET /purge/path/to/purge
    # Example: GET /purge/css/style.css
    #----------------------------------------------------------------------
    location ~ ^/purge(/.*) {
        access_log off;

        proxy_cache_purge spanel_cache "$scheme$host$1";
    }

    #----------------------------------------------------------------------
    # Cache Purge - All (flush entire cache)
    #----------------------------------------------------------------------
    location = /purge-all {
        access_log off;

        default_type text/plain;

        access_by_lua '
            ngx.shared.spanel_cache:flush_all()
            ngx.say("Cache flushed successfully")
        ';
    }

    #----------------------------------------------------------------------
    # Main Location - Dynamic content
    #----------------------------------------------------------------------
    location / {
        proxy_pass {{UPSTREAM}};
        proxy_ssl_server_name on;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;

        add_header X-Cache-Status $upstream_cache_status always;
    }


    #----------------------------------------------------------------------
    # Static Files - CSS/JS (90 days cache)
    #----------------------------------------------------------------------
    location ~* \.(css|js|woff|woff2|ttf|eot|otf)$ {
        proxy_pass {{UPSTREAM}};
        proxy_ssl_server_name on;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "gzip";

        proxy_cache_valid 200 90d;
        proxy_cache_valid 404 1m;

        expires 90d;
        add_header Cache-Control "public";
        add_header X-Cache-Status $upstream_cache_status always;
        access_log off;
    }

}