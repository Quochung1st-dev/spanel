#==============================================================================
# Template: Nginx Proxy with Cache & Lua
# Domain: {{DOMAIN}}
# Upstream: {{UPSTREAM}}
# Created: {{DATE}}
#
# Luồng xử lý:
# 1. access_by_lua:
#    - Có querystring → bypass_cache = true
#    - Có WP cookies → bypass_cache = true
#    - Không có → check cache thông thường
# 2. Nếu bypass_cache → proxy_no_cache + proxy_cache_bypass
# 3. WAF check → block nếu vi phạm
# 4. WAF pass → vào backend
#==============================================================================

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}} www.{{DOMAIN}};

    access_log /var/www/{{DOMAIN}}/logs/access.log;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Proxy Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name {{DOMAIN}} www.{{DOMAIN}};

    # SSL Certificate
    ssl_certificate /var/server/ssl/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /var/server/ssl/{{DOMAIN}}/privkey.pem;

    # SSL Settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    #----------------------------------------------------------------------
    # Lua Access Phase
    # - Check cache bypass (querystring, WP cookies)
    # - WAF check
    # - Rate limiting
    #----------------------------------------------------------------------
    access_by_lua_file /var/server/lua/access.lua;

    #----------------------------------------------------------------------
    # Cache Configuration
    #----------------------------------------------------------------------
    proxy_cache spanel_cache;
    proxy_cache_valid 200 5m;
    proxy_cache_valid 404 1m;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_min_uses 1;

    # Cache bypass based on Lua set variables
    proxy_no_cache $bypass_cache;
    proxy_cache_bypass $bypass_cache;

    # Ignore origin cache headers
    proxy_ignore_headers Cache-Control Expires Set-Cookie X-Accel-Expires;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 24 4k;
    proxy_busy_buffers_size 8k;

    # Logging
    access_log /var/www/{{DOMAIN}}/logs/access.log;
    error_log /var/www/{{DOMAIN}}/logs/error.log;

    #----------------------------------------------------------------------
    # Health Check - No cache, no WAF
    #----------------------------------------------------------------------
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    #----------------------------------------------------------------------
    # Main Location - Dynamic content
    #----------------------------------------------------------------------
    location / {
        # Bypass cache if:
        # - Lua set bypass_cache = "1"
        # - Has nocache cookie
        set $bypass_cache $cookie_nocache;

        proxy_pass {{UPSTREAM}};
        proxy_ssl_server_name on;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;

        # Add cache status
        add_header X-Cache-Status $upstream_cache_status always;
    }

    #----------------------------------------------------------------------
    # Static Files - Images (Long cache)
    #----------------------------------------------------------------------
    location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|svg)$ {
        set $bypass_cache "";

        proxy_pass {{UPSTREAM}};
        proxy_ssl_server_name on;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "";

        proxy_cache_valid 200 30m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;

        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status $upstream_cache_status always;
        access_log off;
    }

    #----------------------------------------------------------------------
    # Static Files - CSS/JS (Medium cache)
    #----------------------------------------------------------------------
    location ~* \.(css|js|woff|woff2|ttf|eot|otf)$ {
        set $bypass_cache "";

        proxy_pass {{UPSTREAM}};
        proxy_ssl_server_name on;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "gzip";

        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating;

        expires 7d;
        add_header Cache-Control "public";
        add_header X-Cache-Status $upstream_cache_status always;
        access_log off;
    }

    #----------------------------------------------------------------------
    # HTML Pages - Short cache
    #----------------------------------------------------------------------
    location ~* \.html?$ {
        set $bypass_cache $cookie_nocache;

        proxy_pass {{UPSTREAM}};
        proxy_ssl_server_name on;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "";

        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

        expires 5m;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Cache-Status $upstream_cache_status always;
    }
}