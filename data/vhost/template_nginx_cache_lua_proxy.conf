#==============================================================================
# Template: Nginx Proxy with Cache & Lua
# Domain: {{DOMAIN}}
# Upstream: {{UPSTREAM}}
# Created: {{DATE}}
#
# Yêu cầu file cache config: conf.d/cache_{{DOMAIN}}.conf
# (v-template-domain tự động tạo)
#
# Luồng xử lý:
# 1. access_by_lua (inline):
#    - Có querystring → bypass_cache = 1
#    - Có WP cookies → bypass_cache = 1
#    - Không có → check cache thông thường
# 2. WAF check → block nếu vi phạm
# 3. WAF pass → vào backend
#==============================================================================

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}} www.{{DOMAIN}};

    access_log /var/www/{{DOMAIN}}/logs/access.log;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Proxy Server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name {{DOMAIN}} www.{{DOMAIN}};

    # SSL Certificate
    ssl_certificate /var/www/{{DOMAIN}}/ssl/server.crt;
    ssl_certificate_key /var/www/{{DOMAIN}}/ssl/server.key;

    # SSL Settings
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    #----------------------------------------------------------------------
    # LUA ACCESS PHASE (INLINE)
    # - Check cache bypass (querystring, WP cookies)
    # - WAF check
    # - Rate limiting
    #----------------------------------------------------------------------
    # Declare variables for Lua
    set $cache_action "check";
    set $bypass_cache "0";
    set $waf_check_result "pass";
    set $waf_rule "";

    access_by_lua_block {
        local ngx = ngx
        local var = ngx.var
        local log = ngx.log
        local ERR = ngx.ERR
        local WARN = ngx.WARN

        local ngx_shared = ngx.shared
        local spanel_shm = ngx_shared and ngx_shared.spanel_shm

        -- Cookie names for WordPress (bypass cache)
        local WP_COOKIES = {
            "wordpress_test_cookie",
            "wordpress_logged_in_",
            "wp-settings-",
            "wp-settings-time-",
            "wordpress_",
            "comment_author_",
            "woocommerce_",
            "edd_wp_session"
        }

        -- Config
        local waf_enabled = os.getenv("WAF_ENABLED") or "true"
        local waf_mode = os.getenv("WAF_MODE") or "active"
        local rate_limit = os.getenv("RATE_LIMIT_ENABLED") or "true"
        local rate_limit_req = tonumber(os.getenv("RATE_LIMIT_REQUESTS") or "10000")
        local rate_limit_window = tonumber(os.getenv("RATE_LIMIT_WINDOW") or "60")

        -- Initialize
        var.cache_action = "check"
        var.bypass_cache = "0"
        var.waf_check_result = "pass"

        -- Skip for internal
        if var.server_addr == var.remote_addr then
            return
        end

        -- STEP 1: Check cache bypass
        local args = var.args or ""
        local headers = ngx.req.get_headers()
        local cookie_header = headers["cookie"] or ""
        local bypass = false

        -- Has querystring
        if args and args ~= "" then
            bypass = true
            var.cache_action = "bypass_qs"
            var.bypass_cache = "1"
        end

        -- Has WP cookies
        if not bypass and cookie_header ~= "" then
            for _, pattern in ipairs(WP_COOKIES) do
                if string.find(cookie_header, pattern, 1, true) then
                    bypass = true
                    var.cache_action = "bypass_wp"
                    var.bypass_cache = "1"
                    break
                end
            end
        end

        -- Skip WAF for WordPress admin paths
        local wp_admin_paths = {
            "/wp-admin/",
            "/wp-login.php",
            "/wp-admin/admin-ajax.php"
        }
        local skip_waf = false
        local uri = var.request_uri or ""
        for _, path in ipairs(wp_admin_paths) do
            if string.find(uri, path, 1, true) then
                skip_waf = true
                break
            end
        end

        -- STEP 2: WAF check
        if waf_enabled == "true" and not skip_waf then
            local waf_ok, waf = pcall(require, "waf")
            if waf_ok then
                local result = waf.check()
                if not result.pass then
                    var.waf_check_result = "block"
                    var.waf_rule = result.rule or ""

                    -- Log
                    local log_file = io.open("/var/server/logs/waf/blocked.log", "a")
                    if log_file then
                        log_file:write(string.format(
                            "[%s] %s | %s | %s | %s\n",
                            ngx.localtime(),
                            var.remote_addr,
                            result.rule or "unknown",
                            result.reason or "unknown",
                            var.request_uri or ""
                        ))
                        log_file:close()
                    end

                    log(ERR, "[WAF] Blocked: ", var.remote_addr, " - ", result.reason)

                    if waf_mode == "active" then
                        ngx.status = ngx.HTTP_FORBIDDEN
                        ngx.say("403 Forbidden - Security Policy Violation")
                        ngx.exit(ngx.HTTP_FORBIDDEN)
                        return
                    end
                end
            end
        end

        -- STEP 3: Rate limit
        if rate_limit == "true" and spanel_shm then
            local key = "rate_limit:" .. var.remote_addr
            local current = spanel_shm:get(key)

            if current and current >= rate_limit_req then
                log(WARN, "[RateLimit] Limited: ", var.remote_addr)
                ngx.status = ngx.HTTP_TOO_MANY_REQUESTS
                ngx.say("429 Too Many Requests")
                ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
                return
            end

            local ok = spanel_shm:incr(key, 1)
            if not ok then
                spanel_shm:set(key, 1, rate_limit_window)
            end
        end

        log(WARN, "[SPanel] Pass: ", var.remote_addr, " ", var.request_uri, " (", var.cache_action, ")")
    }

    #----------------------------------------------------------------------
    # Cache Configuration (uses zone from conf.d/cache_{{DOMAIN}}.conf)
    #----------------------------------------------------------------------
    proxy_cache {{CACHE_ZONE}};
    proxy_cache_valid 200 5m;
    proxy_cache_valid 404 1m;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_min_uses 1;

    # Cache bypass based on maps from cache config
    proxy_no_cache $skip_cache_method_{{CACHE_KEY}};
    proxy_cache_bypass $skip_cache_method_{{CACHE_KEY}};

    # Ignore origin cache headers
    proxy_ignore_headers Cache-Control Expires Set-Cookie X-Accel-Expires;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 24 4k;
    proxy_busy_buffers_size 8k;

    # Logging
    access_log /var/www/{{DOMAIN}}/logs/access.log;
    error_log /var/www/{{DOMAIN}}/logs/error.log;

    #----------------------------------------------------------------------
    # Health Check - No cache, no WAF
    #----------------------------------------------------------------------
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    #----------------------------------------------------------------------
    # Cache Purge - Single URL
    # Usage: GET /purge/path/to/file
    #----------------------------------------------------------------------
    location ~ ^/purge(/.*) {
        access_log off;
        default_type text/plain;

        # Allow all IPs to purge
        allow all;
        deny all;

        content_by_lua_block {
            local path = ngx.var[1] or "/"
            local domain = "{{DOMAIN}}"
            local cache_dir = "{{CACHE_DIR}}"

            -- Build cache key (same as proxy_cache_key)
            local key = "https" .. domain .. path
            local key_hash = ngx.md5(key)

            -- Cache path: levels=1:2 → dir1=last char, dir2=2 chars before last
            local dir1 = string.sub(key_hash, -1)
            local dir2 = string.sub(key_hash, -3, -2)

            local cache_path = cache_dir .. "/" .. dir1 .. "/" .. dir2 .. "/" .. key_hash

            local f = io.open(cache_path, "r")
            if f then
                f:close()
                os.remove(cache_path)
                ngx.say("Purged: " .. path)
            else
                ngx.say("Not found in cache: " .. path)
            end
        }
    }

    #----------------------------------------------------------------------
    # Cache Purge - All (flush entire cache)
    # Usage: GET /purge-all
    #----------------------------------------------------------------------
    location = /purge-all {
        access_log off;
        default_type text/plain;

        # Allow all IPs to purge
        allow all;
        deny all;

        content_by_lua_block {
            local handle = io.popen("find {{CACHE_DIR}} -type f -delete 2>/dev/null && echo 'Done' || echo 'Error'")
            local result = handle:read("*a")
            handle:close()
            ngx.say("Cache flushed: " .. result)
        }
    }

    #----------------------------------------------------------------------
    # Main Location - Dynamic content
    #----------------------------------------------------------------------
    location / {
        proxy_pass https://{{UPSTREAM_IP}}:443;
        proxy_ssl_server_name on;
        proxy_ssl_name {{UPSTREAM_HOST}};
        proxy_ssl_verify off;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;

        # Replace domain in response
        sub_filter_once off;
        sub_filter_types text/css application/javascript;
        sub_filter 'https://{{UPSTREAM_HOST}}' 'https://{{DOMAIN}}';

        add_header X-Cache-Status $upstream_cache_status always;
    }

    #----------------------------------------------------------------------
    # Static Files - CSS/JS (90 days cache)
    #----------------------------------------------------------------------
    location ~* \.(css|js|woff|woff2|ttf|eot|otf)$ {
        proxy_pass https://{{UPSTREAM_IP}}:443;
        proxy_ssl_server_name on;
        proxy_ssl_name {{UPSTREAM_HOST}};
        proxy_ssl_verify off;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "gzip";

        proxy_cache_valid 200 90d;
        proxy_cache_valid 404 1m;

        # Replace domain in response
        sub_filter_once off;
        sub_filter 'https://{{UPSTREAM_HOST}}' 'https://{{DOMAIN}}';

        expires 90d;
        add_header Cache-Control "public";
        add_header X-Cache-Status $upstream_cache_status always;
        access_log off;
    }

}