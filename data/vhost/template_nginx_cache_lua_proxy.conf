#==============================================================================
# Template: Nginx Proxy with Cache & Lua
# Domain: {{DOMAIN}}
# Upstream: {{UPSTREAM}}
# Created: {{DATE}}
#==============================================================================

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}} www.{{DOMAIN}};

    # Access log
    access_log /var/www/{{DOMAIN}}/logs/access.log;

    # Redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Proxy Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name {{DOMAIN}} www.{{DOMAIN}};

    # SSL Certificate
    ssl_certificate /var/server/ssl/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /var/server/ssl/{{DOMAIN}}/privkey.pem;

    # SSL Settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Enable Proxy Cache
    proxy_cache spanel_cache;
    proxy_cache_valid 200 5m;
    proxy_cache_valid 404 1m;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_min_uses 1;

    # Cache Status Header
    add_header X-Cache-Status $upstream_cache_status always;

    # Bypass Cache
    proxy_no_cache $skip_cache$cookie_nocache;
    proxy_cache_bypass $skip_cache$cookie_nocache;

    # Ignore Origin Cache Headers
    proxy_ignore_headers Cache-Control Expires Set-Cookie X-Accel-Expires;

    # Buffer Settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 24 4k;
    proxy_busy_buffers_size 8k;

    # Logging
    access_log /var/www/{{DOMAIN}}/logs/access.log;
    error_log /var/www/{{DOMAIN}}/logs/error.log;

    # Health Check
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    #----------------------------------------------------------------------
    # Lua Access Phase - WAF & Rate Limiting
    #----------------------------------------------------------------------
    access_by_lua_file /var/server/lua/access.lua;

    #----------------------------------------------------------------------
    # Main Proxy Location
    #----------------------------------------------------------------------
    location / {
        proxy_pass {{UPSTREAM}};
        proxy_ssl_server_name on;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    #----------------------------------------------------------------------
    # Static Files - Extended Cache
    #----------------------------------------------------------------------
    location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|svg)$ {
        proxy_pass {{UPSTREAM}};
        proxy_ssl_server_name on;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "";

        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Extra cache for images
        proxy_cache_valid 200 30m;
    }

    location ~* \.(css|js|woff|woff2|ttf|eot|otf)$ {
        proxy_pass {{UPSTREAM}};
        proxy_ssl_server_name on;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "";

        expires 7d;
        add_header Cache-Control "public";
        access_log off;

        # Gzip compression for JS/CSS
        proxy_set_header Accept-Encoding "gzip";
    }

    #----------------------------------------------------------------------
    # HTML - Short Cache
    #----------------------------------------------------------------------
    location ~* \.html?$ {
        proxy_pass {{UPSTREAM}};
        proxy_ssl_server_name on;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "";

        expires 5m;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}