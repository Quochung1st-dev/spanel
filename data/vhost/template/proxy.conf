#==============================================================================
# Template: Proxy with Cache
# Usage: {{INCLUDE_PROXY}} or {{INCLUDE}}
# Description: Reverse proxy with caching, for mirroring/caching other websites
# Variables: {{UPSTREAM}} - upstream URL (e.g., https://example.com)
#==============================================================================

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}} www.{{DOMAIN}};
    return 301 https://$host$request_uri;
}

# HTTPS proxy server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name {{DOMAIN}} www.{{DOMAIN}};

    # SSL Certificate
    ssl_certificate /var/server/ssl/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /var/server/ssl/{{DOMAIN}}/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Enable cache
    proxy_cache spanel_cache;
    proxy_cache_valid 200 5m;
    proxy_cache_valid 404 1m;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_min_uses 1;

    # Add cache status header
    add_header X-Cache-Status $upstream_cache_status always;

    # Don't cache these
    proxy_no_cache $skip_cache$cookie_nocache;
    proxy_cache_bypass $skip_cache$cookie_nocache;

    # Force cache ignoring origin headers
    proxy_ignore_headers Cache-Control Expires Set-Cookie X-Accel-Expires;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 24 4k;
    proxy_busy_buffers_size 8k;

    # Logging
    access_log /var/www/{{DOMAIN}}/logs/access.log;
    error_log /var/www/{{DOMAIN}}/logs/error.log;

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Main proxy location
    location / {
        proxy_pass {{UPSTREAM}};
        proxy_ssl_server_name on;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Static files - cache longer
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot|otf)$ {
        proxy_pass {{UPSTREAM}};
        proxy_ssl_server_name on;
        proxy_set_header Host {{UPSTREAM_HOST}};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}