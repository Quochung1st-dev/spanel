#==============================================================================
# Template: Lua Access Control
# Usage: Include this block for custom Lua/WAF processing
# Description: Custom access phase with Lua for advanced security control
#
# This template provides:
# - Custom access_by_lua for authentication/authorization
# - Custom header_filter for response manipulation
# - Rate limiting with shared dict
# - Custom logging
#==============================================================================

# Access phase - Lua processing
access_by_lua '
    local ngx = ngx
    local var = ngx.var
    local log = ngx.log
    local ERR = ngx.ERR
    local WARN = ngx.WARN

    -- Load WAF module
    local waf = require "waf"
    local result = waf.check()

    if not result.pass then
        -- Blocked by WAF
        var.waf_action = "block"
        var.waf_rule = result.rule or ""

        -- Log blocked request
        local log_file = io.open("/var/server/logs/waf/blocked.log", "a")
        if log_file then
            log_file:write(string.format(
                "[%s] %s | %s | %s | %s\n",
                ngx.localtime(),
                var.remote_addr,
                result.rule or "unknown",
                result.reason or "unknown",
                var.request_uri or ""
            ))
            log_file:close()
        end

        log(ERR, "[WAF] Blocked: ", var.remote_addr, " - ", result.reason)
        ngx.status = ngx.HTTP_FORBIDDEN
        ngx.say("403 Forbidden - Security Policy Violation")
        ngx.exit(ngx.HTTP_FORBIDDEN)
    end

    -- Rate limiting check
    local ngx_shared = ngx.shared
    local spanel_shm = ngx_shared and ngx_shared.spanel_shm

    if spanel_shm then
        local rate_key = "rate:" .. var.remote_addr
        local limit = 100 -- requests per minute
        local window = 60

        local count = spanel_shm:get(rate_key)
        if count and count >= limit then
            log(WARN, "[RateLimit] Limited: ", var.remote_addr)
            ngx.status = ngx.HTTP_TOO_MANY_REQUESTS
            ngx.say("429 Too Many Requests")
            ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
        end

        local ok = spanel_shm:incr(rate_key, 1)
        if not ok then
            spanel_shm:set(rate_key, 1, window)
        end
    end

    -- Set custom variables for downstream use
    var.waf_action = "allow"
    var.is_static = "0"

    -- Check if static file
    local uri = var.request_uri or ""
    if string.match(uri, "%.[jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot|otf|webp]$") then
        var.is_static = "1"
    end
';

# Header filter phase - Response headers
header_filter_by_lua '
    local ngx = ngx
    local var = ngx.var

    -- Remove sensitive headers
    ngx.header["Server"] = "SPanel"
    ngx.header["X-Powered-By"] = nil

    -- Add security headers if not present
    if not ngx.header["X-Frame-Options"] then
        ngx.header["X-Frame-Options"] = "SAMEORIGIN"
    end

    if not ngx.header["X-Content-Type-Options"] then
        ngx.header["X-Content-Type-Options"] = "nosniff"
    end

    -- Add processing time header
    ngx.header["X-Processed-By"] = "SPanel"
';

# Log phase - Custom logging
log_by_lua '
    local ngx = ngx
    local var = ngx.var

    -- Extended logging for analytics
    local log_data = string.format(
        "%s|%s|%s|%s|%s|%s|%s",
        ngx.localtime(),
        var.remote_addr,
        var.request_method,
        var.request_uri,
        ngx.status,
        var.bytes_sent,
        var.request_time
    )

    -- Write to custom access log
    local log_file = io.open("/var/server/logs/nginx/extended.log", "a")
    if log_file then
        log_file:write(log_data .. "\n")
        log_file:close()
    end
';