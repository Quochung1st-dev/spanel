#==============================================================================
# Cache Configuration for {{DOMAIN}}
# Auto-generated by v-template-domain
#==============================================================================

# Cache path for this domain
proxy_cache_path {{CACHE_DIR}}
                 levels=1:2
                 keys_zone={{CACHE_ZONE}}:10m
                 max_size=5g
                 inactive=60d
                 use_temp_path=off;

# Skip cache for POST requests
map $request_method $skip_cache_method_{{CACHE_KEY}} {
    POST    1;
    default 0;
}

# Skip cache for requests with query string
map $request_uri $skip_cache_query_{{CACHE_KEY}} {
    ~*\?   1;
    default 0;
}

# Skip cache for WordPress admin paths
map $request_uri $skip_cache_wpadmin_{{CACHE_KEY}} {
    ~*/wp-admin/    1;
    ~*/xmlrpc.php    1;
    ~*/feed/         1;
    ~*/checkout/     1;
    ~*/cart/         1;
    default          0;
}

# Skip cache for logged in users
map $http_cookie $skip_cache_cookie_{{CACHE_KEY}} {
    ~*wordpress_logged_in  1;
    ~*woocommerce_items    1;
    default                0;
}

