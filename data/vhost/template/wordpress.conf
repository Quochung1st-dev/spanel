#==============================================================================
# Template: WordPress
# Usage: {{INCLUDE_WP}} or {{INCLUDE}}
# Description: WordPress-optimized with W3TC cache, permalinks, security
#==============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}} www.{{DOMAIN}};
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name {{DOMAIN}} www.{{DOMAIN}};

    root /var/www/{{DOMAIN}}/public_html;
    index index.php index.html index.htm;

    # SSL Certificate
    ssl_certificate /var/server/ssl/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /var/server/ssl/{{DOMAIN}}/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logging
    access_log /var/www/{{DOMAIN}}/logs/access.log;
    error_log /var/www/{{DOMAIN}}/logs/error.log;

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # WordPress pretty permalinks
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # WordPress PHP processing
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_index index.php;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 32k;
        fastcgi_busy_buffers_size 64k;
    }

    # WordPress specific locations
    location = /wp-login.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        limit_req zone=wplogin burst=1 nodelay;
    }

    location = /wp-admin/admin-ajax.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Allow high traffic for AJAX
    }

    # WordPress uploads - no PHP execution
    location ~* ^/wp-content/uploads/.*\.php$ {
        deny all;
    }

    # WordPress cache plugins
    location ~* "/wp-content/cache/" {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # WordPress plugins cache
    location ~* "/wp-content/plugins/" {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot|otf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to WordPress system files
    location ~ /(\.|wp-config.php|package.json|package-lock.json|readme.html|readme.txt|wp-admin|wp-includes|wp-content) {
        deny all;
    }

    location ~ /\. {
        deny all;
    }

    location ~ /\.ht {
        deny all;
    }

    # WordPress security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
}