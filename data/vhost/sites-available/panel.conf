#==============================================================================
# SPanel Admin Panel
# Listen on port 8888 for SPanel management
#==============================================================================

server {
    listen 8888 default_server;
    listen [::]:8888 default_server;

    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # SPanel API location
    location /api {
        default_type application/json;

        # Lua handler for SPanel API
        rewrite_by_lua_file /var/server/lua/api.lua;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # SPanel Panel files
    location / {
        root /var/server/panel;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }

    # Access log
    access_log /var/server/logs/nginx/panel_access.log;
    error_log /var/server/logs/nginx/panel_error.log;
}